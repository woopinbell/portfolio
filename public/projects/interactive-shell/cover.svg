<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#232528"/>
  <rect x="70" y="58" width="1300" height="784" rx="18" fill="#2b2e32" stroke="#3d4147"/>
  <rect x="70" y="58" width="1300" height="72" rx="18" fill="#303338"/>
  <rect x="70" y="112" width="1300" height="18" fill="#303338"/>
  <text x="120" y="101" fill="#f1eee7" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="700">interactive-shell / execution-pipeline</text>
  <text x="1130" y="101" fill="#9ea5ad" font-family="SFMono-Regular, Consolas, monospace" font-size="15">github + case study</text>
  <rect x="116" y="176" width="1208" height="168" rx="14" fill="#25272b" stroke="#3a3e44"/>
  <text x="154" y="230" fill="#f1eee7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Command Flow</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="154" y="270" width="190" height="48" rx="8" fill="#8fbfa8"/>
    <text x="213" y="301" fill="#17221c">Input</text>
    <rect x="388" y="270" width="190" height="48" rx="8" fill="#3a3e44"/>
    <text x="447" y="301" fill="#d8ddd8">Lexer</text>
    <rect x="622" y="270" width="190" height="48" rx="8" fill="#3a3e44"/>
    <text x="679" y="301" fill="#d8ddd8">Parser</text>
    <rect x="856" y="270" width="190" height="48" rx="8" fill="#3a3e44"/>
    <text x="900" y="301" fill="#d8ddd8">Expansion</text>
    <rect x="1090" y="270" width="190" height="48" rx="8" fill="#3a3e44"/>
    <text x="1143" y="301" fill="#d8ddd8">Executor</text>
  </g>
  <g stroke="#5d646d" stroke-width="2">
    <path d="M344 294H388"/>
    <path d="M578 294H622"/>
    <path d="M812 294H856"/>
    <path d="M1046 294H1090"/>
  </g>
  <rect x="116" y="386" width="566" height="404" rx="14" fill="#25272b" stroke="#3a3e44"/>
  <text x="154" y="437" fill="#f1eee7" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Parser Trace</text>
  <g font-family="SFMono-Regular, Consolas, monospace" font-size="17">
    <text x="154" y="496" fill="#8fbfa8">$</text>
    <text x="184" y="496" fill="#cbd1d6">cat input.txt | grep error &gt; report.log</text>
    <text x="154" y="542" fill="#9ea5ad">tokens: WORD REDIR PIPE WORD WORD REDIR WORD</text>
    <text x="154" y="588" fill="#9ea5ad">ast: pipeline(command, command)</text>
    <text x="154" y="634" fill="#9ea5ad">expand: params, quotes, heredoc markers</text>
    <text x="154" y="680" fill="#9ea5ad">execute: fork, dup2, wait, status</text>
  </g>
  <rect x="724" y="386" width="600" height="404" rx="14" fill="#25272b" stroke="#3a3e44"/>
  <text x="762" y="437" fill="#f1eee7" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Behavior Checks</text>
  <g font-family="SFMono-Regular, Consolas, monospace" font-size="17">
    <text x="762" y="500" fill="#8fbfa8">ok</text>
    <text x="820" y="500" fill="#cbd1d6">redirections apply before command execution</text>
    <text x="762" y="546" fill="#8fbfa8">ok</text>
    <text x="820" y="546" fill="#cbd1d6">builtins mutate parent state when required</text>
    <text x="762" y="592" fill="#8fbfa8">ok</text>
    <text x="820" y="592" fill="#cbd1d6">and/or lists short-circuit with exit status</text>
    <text x="762" y="638" fill="#8fbfa8">ok</text>
    <text x="820" y="638" fill="#cbd1d6">interactive signals preserve prompt behavior</text>
  </g>

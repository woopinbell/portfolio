    <text x="518" y="741" fill="#1e314f" font-size="16" font-weight="900">unsupported-promise</text>
    <text x="836" y="741" fill="#c2410c" font-size="15" font-weight="900">human review</text>
    <rect x="494" y="780" width="482" height="58" rx="15" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="518" y="815" fill="#1e314f" font-size="16" font-weight="900">language-consistency</text>
    <text x="864" y="815" fill="#047857" font-size="15" font-weight="900">pass</text>
  </g>
  <rect x="1050" y="190" width="396" height="682" rx="26" fill="#101827"/>
  <text x="1090" y="242" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">Evaluation trace</text>

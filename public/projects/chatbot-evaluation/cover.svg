    <rect x="1090" y="354" width="316" height="48" rx="14" fill="#17243a"/><text x="1116" y="384" fill="#bfdbfe">2 · Replay conversation</text>
    <rect x="1090" y="422" width="316" height="48" rx="14" fill="#17243a"/><text x="1116" y="452" fill="#bfdbfe">3 · Rule checks</text>
    <rect x="1090" y="490" width="316" height="48" rx="14" fill="#17243a"/><text x="1116" y="520" fill="#bfdbfe">4 · Ollama judge fallback</text>
    <rect x="1090" y="558" width="316" height="48" rx="14" fill="#064e3b"/><text x="1116" y="588" fill="#d1fae5">5 · Report generated</text>

    <rect x="154" y="362" width="232" height="72" rx="18" fill="#fff" stroke="#d9e4ef"/>
    <text x="178" y="396" fill="#1e314f" font-size="17" font-weight="900">safety-support</text>
    <text x="178" y="420" fill="#557083" font-size="13" font-weight="700">18 cases · policy</text>
    <rect x="154" y="452" width="232" height="72" rx="18" fill="#fff" stroke="#d9e4ef"/>
    <text x="178" y="486" fill="#1e314f" font-size="17" font-weight="900">conversation import</text>
    <text x="178" y="510" fill="#557083" font-size="13" font-weight="700">JSON replay</text>
  </g>
  <rect x="456" y="190" width="558" height="330" rx="26" fill="#fff" stroke="#d9e4ef"/>
  <text x="494" y="242" fill="#172339" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900">Run summary</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="494" y="278" width="142" height="132" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>

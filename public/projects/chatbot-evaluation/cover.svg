    <text x="858" y="322" fill="#c2410c" font-size="16" font-weight="900">Needs review</text>
    <text x="858" y="374" fill="#9a3412" font-size="48" font-weight="950">5</text>
  </g>
  <rect x="456" y="552" width="558" height="320" rx="26" fill="#fff" stroke="#d9e4ef"/>

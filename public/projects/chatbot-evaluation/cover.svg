<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Chatbot Evaluation Lab dashboard preview</title>
  <desc id="desc">A stylized evaluation dashboard with suites, score cards, run results, conversation review, and report export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbfdff"/><stop offset=".58" stop-color="#eef7ff"/><stop offset="1" stop-color="#eefbf6"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#0f2338" flood-opacity=".15"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="92" y="76" width="1416" height="848" rx="36" fill="#fff" filter="url(#shadow)"/>
  <rect x="92" y="76" width="1416" height="82" rx="36" fill="#101827"/>
  <text x="134" y="126" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">Chatbot Evaluation Lab</text>
